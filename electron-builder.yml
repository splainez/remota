appId: com.openscp.app
productName: OpenSCP
directories:
  output: release

files:
  - out/**/*
  - "!**/*.test.*"
  - "!**/*.test.ts"
  - "!**/*.test.tsx"
  - "!**/*.spec.*"
  - "!**/*.spec.ts"
  - "!**/*.spec.tsx"

asar: true

win:
  target:
    - target: portable
      arch:
        - x64
  executableName: OpenSCP

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  executableName: openscp
  icon: build-resources/icons

portable:
  artifactName: "OpenSCP-${version}-portable.${ext}"

appImage:
  artifactName: "OpenSCP-${version}.${ext}"
