services:
  sftp:
    image: atmoz/sftp
    container_name: openscp-sftp
    ports:
      - "2222:22"
    environment:
      SFTP_USERS: "testuser:testpass:::upload"
    volumes:
      - sftp_data:/home/testuser
    restart: unless-stopped

  ftp:
    image: fauria/vsftpd
    container_name: openscp-ftp
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      FTP_USER: testuser
      FTP_PASS: testpass
      PASV_ADDRESS: "127.0.0.1"
      PASV_MIN_PORT: "21100"
      PASV_MAX_PORT: "21110"
    volumes:
      - ftp_data:/home/vsftpd
    restart: unless-stopped

  s3:
    image: minio/minio
    container_name: openscp-s3
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - s3_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3-setup:
    image: minio/mc
    container_name: openscp-s3-setup
    depends_on:
      s3:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://s3:9000 minioadmin minioadmin;
      mc mb local/default-bucket --ignore-existing;
      exit 0;
      "

volumes:
  sftp_data:
  ftp_data:
  s3_data:
